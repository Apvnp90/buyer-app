name: Deploy Frontend to Azure

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'buyer-info-web/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: buyer-info-web/package-lock.json

    - name: Install dependencies
      run: |
        cd buyer-info-web
        npm ci

    - name: Build React app
      run: |
        cd buyer-info-web
        npm run build
      env:
        # Update this with your Azure backend URL after deployment
        VITE_API_URL: coding-contest-ui-bge9e5fugugqgubn.canadacentral-01.azurewebsites.net

    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: 'upload'
        app_location: 'buyer-info-web'
        output_location: 'dist'
